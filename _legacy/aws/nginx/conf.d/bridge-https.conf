# ============================================================
#  Bridge — nginx HTTPS virtual host for bridge.globantislabs.com
#  - TLS 1.2/1.3 only, modern cipher suite
#  - HSTS, security headers
#  - Reverse proxy to bridge:3000 (Next.js standalone)
#  - WebSocket upgrade for WebRTC signaling
#  - Static asset caching (immutable)
#  - Rate limiting on /api/ and /api/auth/
# ============================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bridge.globantislabs.com;

    # ---------- TLS certificates (issued by Let's Encrypt) ----------
    ssl_certificate     /etc/letsencrypt/live/bridge.globantislabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridge.globantislabs.com/privkey.pem;

    # ---------- TLS settings (Mozilla intermediate, 2024) ----------
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ---------- HSTS ----------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---------- Security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), interest-cohort=()" always;

    # ---------- Next.js static assets (immutable) ----------
    location /_next/static/ {
        proxy_pass http://bridge_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---------- Auth endpoints (stricter rate limit) ----------
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_conn conn 10;
        proxy_pass http://bridge_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------- API endpoints (general rate limit) ----------
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn conn 20;
        proxy_pass http://bridge_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (for WebRTC signaling if used)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- Everything else (Next.js app) ----------
    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bridge_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (Next.js dev hot reload + signaling)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
