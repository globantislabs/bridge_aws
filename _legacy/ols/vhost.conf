# ====================================================================
# OpenLiteSpeed vhost for Bridge (Next.js standalone on port 3000)
# --------------------------------------------------------------------
# Replace YOUR_DOMAIN with your real domain (e.g. bridge.example.com).
# Place this file at:  /usr/local/lsws/conf/vhosts/bridge.xml
# Then in OLS WebAdmin:
#   Virtual Hosts → bridge → Context → import this file's contexts
# Or simply add the contexts below to your existing vhost via WebAdmin UI.
# ====================================================================

docRoot                   $VH_ROOT/public/
vhname                    bridge

# ─── Listener mapping (do this in WebAdmin → Listeners) ────────────
#   Map: HTTP  (port 80)  → bridge vhost
#   Map: HTTPS (port 443) → bridge vhost  (cert via OLS SSL manager or Let's Encrypt plugin)
#   Map: HTTP/3 (443/udp) → bridge vhost  (enable in Listener → SSL → HTTP3)

# ─── Index files ───────────────────────────────────────────────────
indexFiles                index.html

# ─── Error pages ───────────────────────────────────────────────────
errdoc                    503.html

# ─── Realm (basic auth — DISABLE in production) ────────────────────


# ─── Static files served directly by OLS (cache offloaded from Node) ──
# Next.js standalone writes static assets to .next/static/* and public/*.
context /_next/static/ {
  type                    static
  location                $VH_ROOT/.next/static/
  allowBrowse             1
  extraHeaders            <<<END_extraHeaders
    Cache-Control: public, max-age=31536000, immutable
    X-Content-Type-Options: nosniff
END_extraHeaders
  expiresByType           text/css=31536000, application/javascript=31536000, image/*=31536000, font/*=31536000
}

# Public folder (favicon, robots.txt, logo.svg, etc.)
context / {
  type                    static
  location                $VH_ROOT/public/
  allowBrowse             1
  extraHeaders            <<<END_extraHeaders
    Cache-Control: public, max-age=86400
END_extraHeaders
}

# ─── Proxy to Next.js standalone (port 3000) ───────────────────────
# Everything that isn't a static file is proxied to Node.
extProcessor bridge_node {
  type                    proxy
  address                 127.0.0.1:3000
  maxConns                100
  initTimeout             60
  retryTimeout            5
  respBuffer              0
}

context /api/ {
  type                    appserver
  handler                  bridge_node
  addDefaultCharset       off
  extraHeaders            <<<END_extraHeaders
    X-Proxied-By: OLS-bridge
END_extraHeaders
}

# All other paths (SPA routes like /j/[code], /admin, /meetings) go to Node
context / {
  type                    appserver
  handler                  bridge_node
  addDefaultCharset       off
  extraHeaders            <<<END_extraHeaders
    X-Proxied-By: OLS-bridge
END_extraHeaders
}

# ─── WebSocket support (REQUIRED for OpenAI Realtime + signaling long-poll) ──
# OLS supports WebSocket natively in the proxy handler. The /api/realtime/
# endpoint is the OpenAI Realtime WS proxy — set upgrade=websocket.
context /api/realtime/ {
  type                    appserver
  handler                  bridge_node
  addDefaultCharset       off
  # OLS auto-detects Upgrade: websocket headers when respBuffer=0 above.
  extraHeaders            <<<END_extraHeaders
    Connection: $connection_upgrade
    Upgrade: $http_upgrade
END_extraHeaders
}

# ─── Security headers ──────────────────────────────────────────────
context / {
  extraHeaders            <<<END_extraHeaders
    X-Frame-Options: SAMEORIGIN
    X-Content-Type-Options: nosniff
    Referrer-Policy: strict-origin-when-cross-origin
    Permissions-Policy: camera=(self), microphone=(self), display-capture=(self), geolocation=()
    Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
END_extraHeaders
}

# ─── Gzip / Brotli ─────────────────────────────────────────────────
# Configured in WebAdmin → Configuration → Tuning → Compression.
# Recommended: enable gzip + brotli for text/html, text/css, application/javascript,
# application/json, image/svg+xml. Do NOT compress video/* (we stream WebRTC).
